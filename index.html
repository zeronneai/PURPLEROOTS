<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purple Roots — Creative Agency</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ===== TOKENS ===== */
    :root {
      --black:    #1a1a2e;
      --white:    #fefcf8;
      --paper:    #f5f0e8;
      --paper-alt:#ede8dc;
      --lime:     #c6f135;
      --lavender: #c4b5f4;
      --purple:   #9b8ec4;
      --blush:    #f9c5d0;
      --mint:     #b8e8d0;
      --peach:    #f5d5b8;
      --rule:     2px solid #1a1a2e;
      --shadow-sm:4px 4px 0 #1a1a2e;
      --shadow-md:6px 6px 0 #1a1a2e;
      --shadow-lg:8px 8px 0 #1a1a2e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100dvh;
      overflow: hidden;
      font-family: 'Archivo Black', sans-serif;
      background: var(--black);
    }

    /* ===== MAP ROOT ===== */
    #map-root { position: fixed; inset: 0; }
    #map-bg {
      position: absolute; inset: 0;
      background: url('https://res.cloudinary.com/dsprn0ew4/image/upload/v1778539965/Isometric_illustration_of_a_creative_202605111648_dg6hwp.jpg') center center / cover no-repeat;
    }
    #map-bg::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(26,26,46,0.4) 100%);
      pointer-events: none;
    }

    /* ===== NAVBAR LOGO ===== */
    #map-logo { position: absolute; top: 18px; left: 22px; z-index: 50; }
    #map-logo img {
      height: 38px; width: auto; display: block;
      filter: drop-shadow(0 2px 10px rgba(0,0,0,0.6));
    }

    /* ===== ROOMS ===== */
    .room {
      position: absolute; cursor: pointer; z-index: 1000;
      background: transparent; border: 3px solid transparent; border-radius: 6px;
      padding: 0; margin: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .room:hover {
      border-color: var(--black);
      box-shadow: 0 0 0 2px var(--black), 0 0 20px 4px rgba(26,26,46,0.3);
    }

    /* Glow pulse */
    .room::before {
      content: ''; position: absolute; inset: -8px; border-radius: 14px;
      opacity: 0; pointer-events: none;
      animation: roomGlow 5s ease-in-out infinite;
    }
    .room-1::before { background: var(--lavender); animation-delay: 0s; }
    .room-2::before { background: var(--lime);     animation-delay: 1.4s; }
    .room-3::before { background: var(--peach);    animation-delay: 2.7s; }
    .room-4::before { background: var(--blush);    animation-delay: 0.8s; }
    .room-5::before { background: #fff;            animation-delay: 2.1s; }
    .room-6::before { background: var(--mint);     animation-delay: 3.5s; }
    @keyframes roomGlow {
      0%,75%,100% { opacity: 0; transform: scale(1); }
      38%          { opacity: 0.3; transform: scale(1.05); }
    }

    /* Desktop room positions */
    .room-1 { left: 7%;  top: 18%; width: 17%; height: 22%; }
    .room-2 { left: 38%; top: 8%;  width: 23%; height: 22%; }
    .room-3 { left: 73%; top: 16%; width: 19%; height: 22%; }
    .room-4 { left: 5%;  top: 57%; width: 20%; height: 25%; }
    .room-5 { left: 38%; top: 60%; width: 23%; height: 22%; }
    .room-6 { left: 73%; top: 57%; width: 19%; height: 25%; }

    /* ===== FLOATING LABELS ===== */
    .room-label {
      position: absolute;
      bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 3px;
      white-space: nowrap; pointer-events: none;
      animation: floatLabel 3s ease-in-out infinite;
      box-shadow: 2px 2px 0 rgba(26,26,46,0.25);
    }
    .room-1 .room-label { background: var(--lavender); color: var(--black); animation-delay: 0s; }
    .room-2 .room-label { background: var(--lime);     color: var(--black); animation-delay: 0.5s; }
    .room-3 .room-label { background: var(--peach);    color: var(--black); animation-delay: 1.1s; }
    .room-4 .room-label { background: var(--blush);    color: var(--black); animation-delay: 1.6s; }
    .room-5 .room-label { background: var(--white);    color: var(--black); border: 1px solid var(--black); animation-delay: 2.1s; }
    .room-6 .room-label { background: var(--mint);     color: var(--black); animation-delay: 2.7s; }
    @keyframes floatLabel {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(-7px); }
    }
    @keyframes floatLabelDown {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(5px); }
    }

    /* ===== CENTRAL SCREEN ===== */
    #central-video-wrap {
      position: absolute; left: 37%; top: 35%;
      width: 24%; height: 24%;
      z-index: 15; cursor: pointer;
      border: 2px solid rgba(26,26,46,0.5); border-radius: 3px;
      overflow: hidden;
      background: #1a1a2e;
      box-shadow: 0 8px 32px rgba(0,0,0,0.55), var(--shadow-sm);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    #central-video-wrap:hover {
      transform: scale(1.02);
      box-shadow: 0 16px 48px rgba(0,0,0,0.7), var(--shadow-md);
    }
    #screen-inner {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex; flex-direction: column; align-items: center;
      width: 90%; text-align: center;
    }
    #screen-logo {
      max-width: 120px; width: 80%; height: auto; display: block;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }
    #screen-cta {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.06em;
      color: #f5f0e8;
      margin-top: 12px;
      white-space: nowrap;
    }

    /* ===== VIDEO EXPAND MODAL ===== */
    #video-expand {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: rgba(26,26,46,0.88); backdrop-filter: blur(14px);
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #video-expand.active { opacity: 1; pointer-events: all; }
    #video-expand video {
      width: min(88vw, 1100px); height: auto; max-height: 84vh;
      border: var(--rule); box-shadow: var(--shadow-lg);
    }
    #video-expand-close {
      position: absolute; top: 22px; right: 26px;
      background: var(--black); color: var(--white);
      border: var(--rule); width: 44px; height: 44px;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Archivo Black', sans-serif;
      box-shadow: var(--shadow-sm); transition: transform 0.1s, box-shadow 0.1s;
    }
    #video-expand-close:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow-md); }

    /* ===== DESKTOP SIDE PANEL ===== */
    #panel {
      position: fixed; top: 0; right: 0;
      width: 420px; height: 100%;
      background: var(--paper); border-left: var(--rule);
      z-index: 100;
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.22,1,0.36,1);
      display: flex; flex-direction: column; overflow: hidden;
    }
    #panel.open { transform: translateX(0); }
    #panel-accent { height: 5px; flex-shrink: 0; }
    #panel-header {
      padding: 24px 24px 18px; border-bottom: var(--rule);
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-shrink: 0;
    }
    #panel-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: 1.25rem; line-height: 1.15;
      color: var(--black); max-width: 300px;
    }
    #panel-close {
      background: var(--black); color: var(--white);
      border: var(--rule); width: 40px; height: 40px;
      font-size: 16px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-sm); transition: transform 0.1s, box-shadow 0.1s;
      font-family: 'Archivo Black', sans-serif;
    }
    #panel-close:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow-md); }
    #panel-body { padding: 22px 24px; overflow-y: auto; flex: 1; }

    /* ===== MOBILE FULLSCREEN MODAL ===== */
    #mobile-modal {
      position: fixed; inset: 0;
      z-index: 9999;
      background: var(--paper);
      overflow-y: auto;
      display: none;
      flex-direction: column;
    }
    #mobile-modal.active {
      display: flex;
    }
    #mm-accent { height: 5px; flex-shrink: 0; }
    #mm-header {
      position: sticky; top: 0;
      background: var(--paper);
      border-bottom: var(--rule);
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 1; flex-shrink: 0;
    }
    #mm-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: 1.1rem; line-height: 1.2;
      color: var(--black); flex: 1; margin-right: 12px;
    }
    #mm-close {
      background: var(--black); color: var(--white);
      border: var(--rule); min-width: 48px; height: 48px;
      font-size: 22px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-sm);
      font-family: 'Archivo Black', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    #mm-body { padding: 20px; flex: 1; }

    /* ===== PANEL / MODAL INNER COMPONENTS ===== */
    .panel-section-label {
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--purple); margin-bottom: 14px;
    }
    .value-cards { display: flex; flex-direction: column; gap: 12px; }
    .value-card { background: var(--white); border: var(--rule); padding: 14px; box-shadow: var(--shadow-sm); }
    .value-card-icon { font-size: 1.3rem; margin-bottom: 5px; }
    .value-card-title { font-family: 'Archivo Black', sans-serif; font-size: 0.82rem; margin-bottom: 5px; color: var(--black); }
    .value-card-desc { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; line-height: 1.6; color: rgba(26,26,46,0.68); }

    .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .service-item { background: var(--white); border: var(--rule); padding: 13px; box-shadow: var(--shadow-sm); }
    .service-num { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 0.15em; color: var(--purple); margin-bottom: 4px; }
    .service-name { font-family: 'Archivo Black', sans-serif; font-size: 0.76rem; margin-bottom: 5px; color: var(--black); }
    .service-desc { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; line-height: 1.55; color: rgba(26,26,46,0.65); }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .stat-box { background: var(--black); color: var(--white); border: var(--rule); padding: 14px 10px; text-align: center; box-shadow: var(--shadow-sm); }
    .stat-num { font-family: 'Archivo Black', sans-serif; font-size: 1.4rem; letter-spacing: -0.02em; color: var(--lime); }
    .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 8.5px; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; color: rgba(255,255,255,0.6); }
    .testimonials-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .testi-card { background: var(--white); border: var(--rule); padding: 13px; box-shadow: var(--shadow-sm); }
    .testi-quote { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 0.76rem; line-height: 1.55; color: var(--black); margin-bottom: 7px; }
    .testi-author { font-family: 'JetBrains Mono', monospace; font-size: 8.5px; letter-spacing: 0.08em; color: var(--purple); }

    .brand-pcard {
      aspect-ratio: 4/5; border: var(--rule); overflow: hidden; cursor: pointer;
      position: relative; box-shadow: var(--shadow-sm);
      transition: transform 0.12s, box-shadow 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .brand-pcard:active { transform: translate(-2px,-2px); box-shadow: var(--shadow-md); }
    .brand-pcard img.bp-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
    .brand-pcard .bp-lbl {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.6); color: #fff;
      font-family: 'Archivo Black', sans-serif; font-size: 8px;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 5px 7px; text-align: center;
    }

    .fit-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .fit-col { border: var(--rule); padding: 14px; box-shadow: var(--shadow-sm); }
    .fit-col.not { background: var(--lime); }
    .fit-col.yes { background: var(--lavender); }
    .fit-col-title { font-family: 'Archivo Black', sans-serif; font-size: 0.7rem; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 10px; line-height: 1.3; }
    .fit-col ul { list-style: none; display: flex; flex-direction: column; gap: 7px; }
    .fit-col ul li { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; line-height: 1.5; color: var(--black); padding-left: 12px; position: relative; }
    .fit-col ul li::before { content: '—'; position: absolute; left: 0; }
    .fit-btn {
      display: inline-block; margin-top: 12px; padding: 7px 12px;
      font-family: 'Archivo Black', sans-serif; font-size: 9px;
      letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none;
      border: var(--rule); box-shadow: var(--shadow-sm); cursor: pointer;
      background: var(--black); color: var(--white);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .fit-btn:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow-md); }

    .process-steps { display: flex; flex-direction: column; gap: 10px; }
    .process-step { border: var(--rule); padding: 14px; box-shadow: var(--shadow-sm); }
    .step-num { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.15em; margin-bottom: 4px; color: var(--black); }
    .step-title { font-family: 'Archivo Black', sans-serif; font-size: 0.88rem; margin-bottom: 5px; color: var(--black); }
    .step-desc { font-family: 'JetBrains Mono', monospace; font-size: 10px; line-height: 1.6; color: rgba(26,26,46,0.68); }

    /* ===== GET STARTED CTA ===== */
    #get-started {
      position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
      z-index: 50; background: var(--lime); color: var(--black);
      border: var(--rule); padding: 13px 30px;
      font-family: 'Archivo Black', sans-serif; font-size: 0.88rem;
      text-decoration: none; box-shadow: var(--shadow-md);
      transition: transform 0.12s, box-shadow 0.12s; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    #get-started:hover  { transform: translateX(-50%) translate(-3px,-3px); box-shadow: var(--shadow-lg); }
    #get-started:active { transform: translateX(-50%) translate(4px,4px); box-shadow: 2px 2px 0 var(--black); }

    /* ===== BRAND VIDEO MODAL ===== */
    #brand-video-modal {
      position: fixed; inset: 0; z-index: 10000;
      display: flex; align-items: center; justify-content: center;
      background: rgba(26,26,46,0.92); backdrop-filter: blur(18px);
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #brand-video-modal.active { opacity: 1; pointer-events: all; }
    #brand-video-inner {
      background: var(--paper); border: var(--rule);
      box-shadow: var(--shadow-lg); padding: 22px;
      max-width: 620px; width: 90vw;
    }
    #brand-video-name { font-family: 'Archivo Black', sans-serif; font-size: 1rem; margin-bottom: 14px; color: var(--black); }
    #brand-video-media { width: 100%; aspect-ratio: 16/9; background: var(--black); }
    #brand-video-media iframe, #brand-video-media video { width: 100%; height: 100%; border: none; display: block; }
    #brand-video-close {
      display: block; margin-top: 12px;
      background: var(--black); color: var(--white); border: var(--rule);
      padding: 9px 18px; font-family: 'Archivo Black', sans-serif; font-size: 11px;
      cursor: pointer; box-shadow: var(--shadow-sm); transition: transform 0.1s, box-shadow 0.1s; width: 100%;
    }
    #brand-video-close:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow-md); }

    /* ===== MOBILE OVERRIDES ===== */
    @media (max-width: 767px) {
      /* Lock viewport */
      html, body { touch-action: none; }

      /* Hide desktop panel on mobile */
      #panel { display: none !important; }

      /* Vertical map background */
      #map-bg {
        background-image: url('https://res.cloudinary.com/dsprn0ew4/image/upload/v1778541765/GENERA_LA_MISMA_IMAGEN__QUE_202605111722_lso037.jpg');
        background-size: cover;
        background-position: center top;
      }

      /* Mobile room positions — shifted down so labels have space */
      .room-1 { left: 2%;  top: 10%; width: 46%; height: 20%; }
      .room-2 { left: 52%; top: 10%; width: 46%; height: 20%; }
      .room-3 { left: 2%;  top: 32%; width: 46%; height: 20%; }
      .room-4 { left: 52%; top: 32%; width: 46%; height: 20%; }
      .room-5 { left: 2%;  top: 76%; width: 46%; height: 20%; }
      .room-6 { left: 52%; top: 76%; width: 46%; height: 20%; }

      /* Labels above each room */
      .room-label {
        font-size: 9px; padding: 3px 7px;
        top: -28px; bottom: auto;
        animation-name: floatLabel;
      }

      /* Central screen on mobile */
      #central-video-wrap {
        left: 50%; top: 52%;
        transform: translateX(-50%);
        width: 52%; height: 16%;
      }
      #central-video-wrap:hover { transform: translateX(-50%) scale(1.02); }
      #screen-logo  { max-width: 80px; }
      #screen-cta   { font-size: 14px; margin-top: 6px; }

      /* CTA button */
      #get-started {
        position: absolute;
        top: 73%; bottom: auto;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.78rem; padding: 10px 22px;
      }
      #get-started:active { transform: translateX(-50%) translate(3px,3px); }

      /* Mobile modal inner: single-column brand grid */
      #mm-body .services-grid,
      #mm-body .fit-cols { grid-template-columns: 1fr; }
      #mm-body .stats-grid { grid-template-columns: 1fr 1fr; }
      #mm-body .testimonials-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ═══════════════ MAP ROOT ═══════════════ -->
<div id="map-root">
  <div id="map-bg"></div>

  <div id="map-logo">
    <img src="https://res.cloudinary.com/dsprn0ew4/image/upload/v1778260022/ChatGPT_Image_May_8_2026_10_27_10_AM_lxyez3.png" alt="Purple Roots" />
  </div>

  <!-- ROOMS — <button> for reliable tap on iOS/Android; events added via JS -->
  <button type="button" class="room room-1" data-room="1"><span class="room-label">Not Another Agency</span></button>
  <button type="button" class="room room-2" data-room="2"><span class="room-label">What We Do</span></button>
  <button type="button" class="room room-3" data-room="3"><span class="room-label">Numbers + Reviews</span></button>
  <button type="button" class="room room-4" data-room="4"><span class="room-label">Our Brands</span></button>
  <button type="button" class="room room-5" data-room="5"><span class="room-label">Right Fit?</span></button>
  <button type="button" class="room room-6" data-room="6"><span class="room-label">How We Work</span></button>

  <!-- CENTRAL SCREEN -->
  <div id="central-video-wrap">
    <div id="screen-inner">
      <img id="screen-logo" src="https://res.cloudinary.com/dsprn0ew4/image/upload/v1778260022/ChatGPT_Image_May_8_2026_10_27_10_AM_lxyez3.png" alt="Purple Roots" />
      <div id="screen-cta">▶ CLICK PARA CONOCERNOS</div>
    </div>
  </div>

  <a href="https://wa.me/19152343655" target="_blank" id="get-started">Get Started →</a>
</div>

<!-- ═══════════════ VIDEO EXPAND ═══════════════ -->
<div id="video-expand">
  <video loop playsinline controls>
    <source src="https://res.cloudinary.com/dsprn0ew4/video/upload/v1778258855/WhatsApp_Video_2026-05-08_at_10.45.53_AM_otqvm2.mp4" type="video/mp4" />
  </video>
  <button id="video-expand-close">✕</button>
</div>

<!-- ═══════════════ DESKTOP SIDE PANEL ═══════════════ -->
<div id="panel">
  <div id="panel-accent"></div>
  <div id="panel-header">
    <div id="panel-title"></div>
    <button id="panel-close">✕</button>
  </div>
  <div id="panel-body"></div>
</div>

<!-- ═══════════════ MOBILE FULLSCREEN MODAL ═══════════════ -->
<div id="mobile-modal">
  <div id="mm-accent"></div>
  <div id="mm-header">
    <div id="mm-title"></div>
    <button id="mm-close">✕</button>
  </div>
  <div id="mm-body"></div>
</div>

<!-- ═══════════════ BRAND VIDEO MODAL ═══════════════ -->
<div id="brand-video-modal">
  <div id="brand-video-inner">
    <div id="brand-video-name"></div>
    <div id="brand-video-media"></div>
    <button id="brand-video-close">Close ✕</button>
  </div>
</div>

<script>
/* ── DIAGNÓSTICO TEMPORAL ── */
console.log('=== DIAGNÓSTICO ===');
console.log('Rooms encontrados:', document.querySelectorAll('.room').length);

/* ── HELPERS ── */
const isMobile = () => window.innerWidth < 768;

function attachBrandCardEvents(container) {
  container.querySelectorAll('.brand-pcard').forEach(c => {
    c.addEventListener('click', () => openBrandVideo(c.dataset.name, c.dataset.video));
    c.addEventListener('touchend', (e) => {
      e.preventDefault();
      openBrandVideo(c.dataset.name, c.dataset.video);
    });
  });
}

/* ── DESKTOP PANEL ── */
const panel       = document.getElementById('panel');
const panelTitle  = document.getElementById('panel-title');
const panelBody   = document.getElementById('panel-body');
const panelAccent = document.getElementById('panel-accent');

function openDesktopPanel(num) {
  const d = roomPanels[num];
  panelTitle.textContent = d.title;
  panelAccent.style.background = d.accent;
  panelBody.innerHTML = d.render();
  panel.classList.add('open');
  if (num === 4) attachBrandCardEvents(panelBody);
}

document.getElementById('panel-close').addEventListener('click', () => panel.classList.remove('open'));

/* ── MOBILE MODAL ── */
const mobileModal = document.getElementById('mobile-modal');
const mmTitle     = document.getElementById('mm-title');
const mmBody      = document.getElementById('mm-body');
const mmAccent    = document.getElementById('mm-accent');

function openMobileModal(num) {
  const d = roomPanels[num];
  mmTitle.textContent = d.title;
  mmAccent.style.background = d.accent;
  mmBody.innerHTML = d.render();
  mobileModal.classList.add('active');
  document.body.style.overflow = 'hidden';
  mobileModal.scrollTop = 0;
  if (num === 4) attachBrandCardEvents(mmBody);
}

function closeMobileModal() {
  mobileModal.classList.remove('active');
  document.body.style.overflow = '';
}

document.getElementById('mm-close').addEventListener('click', closeMobileModal);

/* ── UNIFIED openPanel ── */
function openPanel(num) {
  if (isMobile()) {
    openMobileModal(num);
  } else {
    openDesktopPanel(num);
  }
}

/* ── ROOM EVENT LISTENERS ── */
/* <button> + touch-action:manipulation → native click fires instantly on tap */
document.querySelectorAll('.room').forEach(r => {
  const num = +r.dataset.room;
  r.addEventListener('click', () => openPanel(num));
});

/* ── VIDEO EXPAND ── */
const videoExpand = document.getElementById('video-expand');
const expandVid   = videoExpand.querySelector('video');

function openVideoExpand() {
  videoExpand.classList.add('active');
  expandVid.muted = false;
  expandVid.play();
}

function closeExpand() {
  videoExpand.classList.remove('active');
  expandVid.pause();
  expandVid.muted = true;
}

const screenWrap = document.getElementById('central-video-wrap');
screenWrap.addEventListener('click', openVideoExpand);
screenWrap.addEventListener('touchend', (e) => {
  e.preventDefault();
  e.stopPropagation();
  openVideoExpand();
});

document.getElementById('video-expand-close').addEventListener('click', closeExpand);
videoExpand.addEventListener('click', e => { if (e.target === videoExpand) closeExpand(); });

/* ── BRAND VIDEO MODAL ── */
const brandModal = document.getElementById('brand-video-modal');
const brandMedia = document.getElementById('brand-video-media');
const brandName  = document.getElementById('brand-video-name');

function openBrandVideo(name, url) {
  brandName.textContent = name;
  brandMedia.innerHTML = url
    ? `<video autoplay muted playsinline controls preload="none" src="${url}"></video>`
    : `<p style="color:var(--white);padding:20px;font-family:'JetBrains Mono',monospace;font-size:12px">Content coming soon.</p>`;
  brandModal.classList.add('active');
}

function closeBrandVideo() {
  brandModal.classList.remove('active');
  brandMedia.innerHTML = '';
}

document.getElementById('brand-video-close').addEventListener('click', closeBrandVideo);
brandModal.addEventListener('click', e => { if (e.target === brandModal) closeBrandVideo(); });

/* ── KEYBOARD ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    panel.classList.remove('open');
    closeMobileModal();
    closeExpand();
    closeBrandVideo();
  }
});
