<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #f5f0e8;
  font-family: 'DM Sans', sans-serif;
}

/* ── MAP ── */
#map {
  position: relative;
  width: 100vw;
  height: 100vh;
  background-image: url('https://res.cloudinary.com/dsprn0ew4/image/upload/v1778539965/Isometric_illustration_of_a_creative_202605111648_dg6hwp.jpg');
  background-size: cover;
  background-position: center;
}

/* mobile bg */
@media (max-width: 767px) {
  #map {
    background-image: url('https://res.cloudinary.com/dsprn0ew4/image/upload/v1778541765/GENERA_LA_MISMA_IMAGEN__QUE_202605111722_lso037.jpg');
    background-position: center top;
  }
}

/* ── LOGO ── */
#logo {
  position: absolute;
  top: 16px; left: 20px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 0.15em;
  color: #1a1a2e;
  background: rgba(245,240,232,0.9);
  padding: 5px 12px 4px;
  border: 1.5px solid #1a1a2e;
  border-radius: 2px;
  z-index: 50;
}

/* ── ROOM BUTTONS ── */
.room {
  position: absolute;
  background: transparent;
  border: none;
  cursor: pointer;
  z-index: 100;
  padding: 0;
  -webkit-tap-highlight-color: rgba(0,0,0,0.1);
  touch-action: manipulation;
}

.room:hover .label, .room:focus .label {
  background: #1a1a2e;
  color: #f5f0e8;
  transform: translateX(-50%) translateY(-3px);
}

.label {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: #f5f0e8;
  color: #1a1a2e;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(9px, 1vw, 13px);
  letter-spacing: 0.12em;
  padding: 4px 10px 3px;
  border-radius: 3px;
  white-space: nowrap;
  border: 1.5px solid #1a1a2e;
  transition: all 0.2s ease;
  pointer-events: none;
  animation: labelFloat 3s ease-in-out infinite;
}

.label::after {
  content: '';
  position: absolute;
  top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 4px solid transparent;
  border-top-color: #1a1a2e;
}

@keyframes labelFloat {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-4px); }
}

/* stagger floats */
.room:nth-child(2) .label { animation-delay: 0.4s; }
.room:nth-child(3) .label { animation-delay: 0.8s; }
.room:nth-child(4) .label { animation-delay: 1.2s; }
.room:nth-child(5) .label { animation-delay: 1.6s; }
.room:nth-child(6) .label { animation-delay: 2.0s; }

/* DESKTOP room positions */
#r1 { top: 7%;  left: 1%;  width: 29%; height: 37%; }
#r2 { top: 1%;  left: 34%; width: 27%; height: 35%; }
#r3 { top: 4%;  left: 63%; width: 36%; height: 40%; }
#r4 { top: 48%; left: 1%;  width: 29%; height: 38%; }
#r5 { top: 55%; left: 28%; width: 36%; height: 38%; }
#r6 { top: 50%; left: 64%; width: 35%; height: 40%; }

/* MOBILE room positions */
@media (max-width: 767px) {
  #r1 { top: 3%;  left: 1%;  width: 47%; height: 20%; }
  #r2 { top: 3%;  left: 51%; width: 47%; height: 20%; }
  #r3 { top: 25%; left: 1%;  width: 47%; height: 20%; }
  #r4 { top: 25%; left: 51%; width: 47%; height: 20%; }
  #r5 { top: 67%; left: 1%;  width: 47%; height: 20%; }
  #r6 { top: 67%; left: 51%; width: 47%; height: 20%; }
  .label { font-size: 8px; padding: 3px 7px 2px; }
}

/* ── CENTER SCREEN ── */
#screen {
  position: absolute;
  top: 37%; left: 36%;
  width: 26%; height: 22%;
  z-index: 90;
  cursor: pointer;
  background: #0d0d1a;
  border: 2px solid #1a1a2e;
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  touch-action: manipulation;
  -webkit-tap-highlight-color: rgba(0,0,0,0.1);
}

#screen:hover { box-shadow: 0 8px 40px rgba(0,0,0,0.7); }

#screen img {
  width: 50px;
  opacity: 0.9;
  margin-bottom: 10px;
  pointer-events: none;
}

#screen-cta {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(10px, 1.2vw, 15px);
  letter-spacing: 0.15em;
  color: #f5f0e8;
  text-align: center;
  pointer-events: none;
}

#screen-pulse {
  position: absolute;
  inset: -6px;
  border: 1.5px solid rgba(196,181,244,0.5);
  border-radius: 6px;
  animation: pulse 2s ease-in-out infinite;
  pointer-events: none;
}

@keyframes pulse {
  0%,100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.02); }
}

@media (max-width: 767px) {
  #screen {
    top: 46%; left: 50%;
    transform: translateX(-50%);
    width: 50%; height: 15%;
  }
  #screen img { width: 32px; margin-bottom: 6px; }
}

/* ── GET STARTED ── */
#cta {
  position: absolute;
  bottom: 5%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 110;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #c6f135;
  color: #1a1a2e;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 0.2em;
  padding: 13px 32px 11px;
  border-radius: 3px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
}

#cta:hover {
  transform: translateX(-50%) translateY(-3px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

@media (max-width: 767px) {
  #cta {
    top: 62%;
    bottom: auto;
    font-size: 15px;
    padding: 10px 24px 9px;
  }
}

/* ── VIDEO MODAL ── */
#video-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,10,20,0.85);
  z-index: 9000;
  align-items: center;
  justify-content: center;
}

#video-modal.open { display: flex; }

#video-box {
  position: relative;
  width: 90vw;
  max-width: 900px;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
}

#video-box video {
  width: 100%; height: 100%;
  object-fit: cover;
}

#video-close {
  position: absolute;
  top: -14px; right: -14px;
  width: 32px; height: 32px;
  background: #1a1a2e;
  color: #f5f0e8;
  border: none;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  z-index: 9001;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
}

/* ── INFO MODAL ── */
#info-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,26,46,0.6);
  z-index: 8000;
  align-items: flex-end;
  justify-content: center;
}

@media (min-width: 768px) {
  #info-modal {
    align-items: center;
    justify-content: flex-end;
  }
}

#info-modal.open { display: flex; }

#info-box {
  position: relative;
  width: 100%;
  max-width: 460px;
  max-height: 85vh;
  overflow-y: auto;
  background: #f5f0e8;
  border: 2px solid #1a1a2e;
  border-radius: 8px 8px 0 0;
  padding: 36px 28px 32px;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.2);
  animation: slideUp 0.3s ease;
}

@media (min-width: 768px) {
  #info-box {
    border-radius: 8px;
    margin-right: 24px;
    animation: slideIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

@keyframes slideIn {
  from { transform: translateX(60px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

#info-handle {
  width: 40px; height: 4px;
  background: #ccc;
  border-radius: 2px;
  margin: 0 auto 20px;
}

@media (min-width: 768px) { #info-handle { display: none; } }

#info-close {

}

#info-accent {

  border-radius: 2px;
  margin-bottom: 12px;
}

#info-num {

  font-size: 72px;
  color: #1a1a2e;

  top: 10px; right: 20px;

}

#info-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 34px;
  letter-spacing: 0.05em;
  color: #1a1a2e;
  margin-bottom: 4px;

}

#info-sub {

  letter-spacing: 0.2em;

  color: #9b8ec4;
  margin-bottom: 14px;
}

#info-body {

  line-height: 1.7;
  color: #333;
}

  gap: 10px;
  margin-top: 12px;

#info-body .card {

#info-body .services {

  margin-top: 12px;
}

#info-body .service {

#info-body .svc-num {

#info-body .stats {

#info-body .fit-head {

#info-body .step {

#info-body .brand-card {

// ── INFO MODAL ──
function openInfo(n) {
  var r = rooms[n];
  document.getElementById('info-num').textContent = r.num;
  document.getElementById('info-title').textContent = r.title;
  document.getElementById('info-sub').textContent = r.sub;
  document.getElementById('info-accent').style.background = r.accent;
  document.getElementById('info-body').innerHTML = r.html;
  document.getElementById('info-modal').className = 'open';
  document.body.style.overflow = 'hidden';
}

function closeInfo() {
  document.getElementById('info-modal').className = '';
  document.body.style.overflow = '';
}

// ── VIDEO MODAL ──
function openVideo() {
  document.getElementById('video-modal').className = 'open';
  document.body.style.overflow = 'hidden';
  var v = document.getElementById('main-video');
  v.muted = false;
  v.play();
}

function closeVideo() {
  document.getElementById('video-modal').className = '';
  document.body.style.overflow = '';
  var v = document.getElementById('main-video');
  v.pause();
  v.currentTime = 0;
}

// ── WIRE UP CLOSE BUTTONS & BACKDROP CLICKS ──
document.getElementById('info-close').addEventListener('click', function(e) {
  e.stopPropagation();
  closeInfo();
});

document.getElementById('video-close').addEventListener('click', function(e) {
  e.stopPropagation();
  closeVideo();
});

document.getElementById('info-modal').addEventListener('click', function(e) {
  if (e.target === this) closeInfo();
});

document.getElementById('video-modal').addEventListener('click', function(e) {
  if (e.target === this) closeVideo();
});

// ESC key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeInfo(); closeVideo(); }
});
</script>
